<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App with Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .weather-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      padding: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      transition: transform 0.3s;
      margin-bottom: 20px;
    }

    .weather-card:hover {
      transform: translateY(-5px);
    }

    h1 {
      font-size: 1.8rem;
      color: # a333;
      margin-bottom: 10px;
    }

    .weather-emoji {
      font-size: 4rem;
      margin: 10px 0;
    }

    .temperature {
      font-size: 2.5rem;
      color: #2c3e50;
      margin: 10px 0;
    }

    .description {
      font-size: 1.2rem;
      color: #555;
      text-transform: capitalize;
      margin-bottom: 15px;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .detail-item {
      background: rgba(0, 0, 0, 0.05);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #333;
    }

    .error {
      color: #e74c3c;
      font-size: 1rem;
      margin-top: 10px;
      display: none;
    }

    .loading {
      font-size: 1rem;
      color: #555;
      display: none;
    }

    /* Chat Button */
    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s;
    }

    .chat-button:hover {
      background: #34495e;
    }

    /* Chatbot Modal */
    .chat-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .chat-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 500px;
      height: 80vh;
      max-height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      padding: 15px;
      text-align: center;
      color: #2c3e50;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .chat-body {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f9 traditional;
    }

    .message {
      margin: 10px 0;
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 80%;
      font-size: 0.9rem;
    }

    .user-message {
      background: #2c3e50;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 2px;
    }

    .ai-message {
      background: #74ebd5;
      color: #2c3e50;
      margin-right: auto;
      border-bottom-left-radius: 2px;
    }

    .typing-indicator {
      background: #74ebd5;
      color: #2c3e50;
      margin-right: auto;
      border-bottom-left-radius: 2px;
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 80%;
      font-size: 0.9rem;
      display: none;
    }

    .typing-indicator::after {
      content: '...';
      animation: typing 1s infinite;
    }

    @keyframes typing {
      0% { content: '.'; }
      33% { content: '..'; }
      66% { content: '...'; }
    }

    .chat-footer {
      padding: 10px;
      background: #fff;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 0.9rem;
      outline: none;
    }

    .send-button {
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin-left: 10px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s;
    }

    .send-button:hover {
      background: #34495e;
    }

    .close-button {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #2c3e50;
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .weather-card {
        padding: 15px;
        max-width: 100%;
      }

      h1 {
        font-size: 1.5rem;
        color: #333;
      }

      .temperature {
        font-size: 2rem;
      }

      .weather-emoji {
        font-size: 3rem;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .chat-container {
        width: 90%;
        height: 90vh;
        max-height: none;
      }

      .chat-button {
        width: 50px;
        height: 50px;
        font-size: 1.2rem;
      }

      .chat-header {
        font-size: 1rem;
      }

      .message, .typing-indicator {
        font-size: 0.8rem;
      }

      .chat-input {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="weather-card">
    <h1 id="location">Fetching location...</h1>
    <div class="loading" id="loading">Loading weather data...</div>
    <div class="weather-emoji" id="weather-emoji">⏳</div>
    <div class="temperature" id="temperature">--°C</div>
    <div class="description" id="description">--</div>
    <div class="details">
      <div class="detail-item">Humidity: <span id="humidity">--%</span></div>
      <div class="detail-item">Wind Speed: <span id="wind-speed">-- m/s</span></div>
      <div class="detail-item">Pressure: <span id="pressure">-- hPa</span></div>
      <div class="detail-item">Feels Like: <span id="feels-like">--°C</span></div>
    </div>
    <div class="error" id="error-message"></div>
  </div>

  <button class="chat-button" id="chat-button">💬</button>

  <div class="chat-modal" id="chat-modal">
    <div class="chat-container">
      <div class="chat-header">
        Weather Assistant 🌤️
        <button class="close-button" id="close-chat">✖</button>
      </div>
      <div class="chat-body" id="chat-body">
        <div class="ai-message">Hi! I'm your weather assistant. How can I help? 🌞</div>
      </div>
      <div class="chat-footer">
        <input type="text" class="chat-input" id="chat-input" placeholder="Type your message...">
        <button class="send-button" id="send-button">➤</button>
      </div>
    </div>
  </div>

  <script type="module">
      // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyBQRUp7rSVRApYmfn0aI8SUv4idrY4DVPk",
    authDomain: "weatherapp1707.firebaseapp.com",
    projectId: "weatherapp1707",
    storageBucket: "weatherapp1707.firebasestorage.app",
    messagingSenderId: "6211785925",
    appId: "1:6211785925:web:c8fe0a6898c44f9284ccac",
    measurementId: "G-7THC2TRNWR"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
    const openWeatherApiKey = '33d2737402be16bf45ec6a17c2c166ce'; // Replace with your OpenWeatherMap API key
    const geminiApiKey = 'AIzaSyAY7dnkRygnjMyQDdXOyPM2ifP1GINrgSo'; // Replace with your Gemini API key
    const weatherEmoji = document.getElementById('weather-emoji');
    const temperature = document.getElementById('temperature');
    const description = document.getElementById('description');
    const locationElement = document.getElementById('location');
    const humidity = document.getElementById('humidity');
    const windSpeed = document.getElementById('wind-speed');
    const pressure = document.getElementById('pressure');
    const feelsLike = document.getElementById('feels-like');
    const errorMessage = document.getElementById('error-message');
    const loading = document.getElementById('loading');
    let currentTemperature = '--°C'; // Store temperature for Gemini API

    // Weather emoji mapping
    const weatherIcons = {
      'Clear': '☀️',
      'Clouds': '☁️',
      'Rain': '🌧️',
      'Drizzle': '🌦️',
      'Thunderstorm': '⛈️',
      'Snow': '❄️',
      'Mist': '🌫️',
      'Fog': '🌫️',
      'Haze': '🌫️'
    };

    // Get user's location
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(fetchWeather, showError);
      } else {
        showError({ message: 'Geolocation is not supported by this browser.' });
      }
    }

    // Fetch weather data
    async function fetchWeather(position) {
      const { latitude, longitude } = position.coords;
      const url = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${openWeatherApiKey}`;
      try {
        loading.style.display = 'block';
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}, Message: ${await response.text()}`);
        const data = await response.json();

        locationElement.textContent = data.name;
        currentTemperature = `${Math.round(data.main.temp)}°C`; // Store temperature
        temperature.textContent = currentTemperature;
        description.textContent = data.weather[0].description;
        humidity.textContent = `${data.main.humidity}%`;
        windSpeed.textContent = `${data.wind.speed} m/s`;
        pressure.textContent = `${data.main.pressure} hPa`;
        feelsLike.textContent = `${Math.round(data.main.feels_like)}°C`;

        const weatherMain = data.weather[0].main;
        weatherEmoji.textContent = weatherIcons[weatherMain] || '🌤️';
        loading.style.display = 'none';
      } catch (error) {
        console.error('Weather Fetch Error:', error);
        showError(error);
      }
    }

    // Handle weather errors
    function showError(error) {
      loading.style.display = 'none';
      errorMessage.style.display = 'block';
      errorMessage.textContent = `Error: ${error.message}`;
      weatherEmoji.textContent = '⚠️';
    }

    // Chatbot functionality
    const chatButton = document.getElementById('chat-button');
    const chatModal = document.getElementById('chat-modal');
    const closeChat = document.getElementById('close-chat');
    const chatBody = document.getElementById('chat-body');
    const chatInput = document.getElementById('chat-input');
    const sendButton = document.getElementById('send-button');

    chatButton.addEventListener('click', () => {
      chatModal.style.display = 'flex';
    });

    closeChat.addEventListener('click', () => {
      chatModal.style.display = 'none';
    });

    sendButton.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        sendMessage();
      }
    });

    async function sendMessage() {
      const messageText = chatInput.value.trim();
      if (!messageText) return;

      // Add user message
      const userMessage = document.createElement('div');
      userMessage.className = 'message user-message';
      userMessage.textContent = messageText;
      chatBody.appendChild(userMessage);

      // Add typing indicator
      const typingIndicator = document.createElement('div');
      typingIndicator.className = 'message typing-indicator';
      typingIndicator.textContent = '...';
      typingIndicator.style.display = 'block';
      chatBody.appendChild(typingIndicator);
      chatBody.scrollTop = chatBody.scrollHeight;

      try {
        // Call Gemini API
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiApiKey}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `Based on the current temperature ${currentTemperature}, ${messageText}`
              }]
            }]
          })
        });

        if (!response.ok) throw new Error(`Gemini API error! Status: ${response.status}`);

        const data = await response.json();
        const aiResponse = data.candidates[0].content.parts[0].text || 'Sorry, I couldn’t process that. Try again! 😅';

        // Remove typing indicator
        typingIndicator.remove();

        // Add AI response
        const aiMessage = document.createElement('div');
        aiMessage.className = 'message ai-message';
        aiMessage.textContent = aiResponse;
        chatBody.appendChild(aiMessage);
      } catch (error) {
        console.error('Gemini API Error:', error);
        // Remove typing indicator
        typingIndicator.remove();
        // Show error message
        const aiMessage = document.createElement('div');
        aiMessage.className = 'message ai-message';
        aiMessage.textContent = `Error: ${error.message} 😓`;
        chatBody.appendChild(aiMessage);
      }

      // Clear input and scroll to bottom
      chatInput.value = '';
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    // Initialize
    getLocation();
  </script>
</body>
</html>
